name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy DS General Web + API
    runs-on: ubuntu-latest

    env:
      SERVICE_WEB: ds-general-web
      SERVICE_API: ds-general-api
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GIT_BRANCH: ${{ github.ref_name }}
      ENV_FILE: .env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${DEPLOY_PATH:-/opt/ds-general}"
            SERVICE_WEB="${SERVICE_WEB:-ds-general-web}"
            SERVICE_API="${SERVICE_API:-ds-general-api}"
            GIT_BRANCH="${GIT_BRANCH:-main}"
            ENV_FILE="${ENV_FILE:-.env}"

            cd "${DEPLOY_PATH}"

            [ -f "${ENV_FILE}" ] || { echo "Missing ${DEPLOY_PATH}/${ENV_FILE}"; exit 1; }

            set -a
            . "./${ENV_FILE}"
            set +a

            PROXY_NETWORK="${PROXY_NETWORK:-}"
            [ -n "${PROXY_NETWORK}" ] || { echo "Missing PROXY_NETWORK in ${ENV_FILE}"; exit 1; }

            docker network inspect "${PROXY_NETWORK}" >/dev/null 2>&1

            echo "Pulling latest code..."
            git fetch origin "${GIT_BRANCH}" --prune
            git reset --hard "origin/${GIT_BRANCH}"

            echo "Building images..."
            docker compose --env-file "${ENV_FILE}" -f docker-compose.prod.yml build "${SERVICE_WEB}" "${SERVICE_API}"

            echo "Starting containers..."
            docker compose --env-file "${ENV_FILE}" -f docker-compose.prod.yml up -d \
              --remove-orphans

            echo "Waiting for services to settle..."
            sleep 15

            echo "Service status:"
            docker compose --env-file "${ENV_FILE}" -f docker-compose.prod.yml ps

            echo "Recent logs:"
            docker compose --env-file "${ENV_FILE}" -f docker-compose.prod.yml logs --tail=100 "${SERVICE_WEB}" "${SERVICE_API}"

            echo "Cleaning up old images..."
            docker image prune -f
