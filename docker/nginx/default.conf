server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Proxy API requests to the backend service (versioned)
    location ^~ /api/v1/ {
        proxy_pass http://ds-general-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Redirect legacy /api/* to /api/v1/*
    location = /api {
        return 308 /api/v1;
    }

    location ~ ^/api/(.*)$ {
        return 308 /api/v1/$1$is_args$args;
    }

    # Proxy uploads through the API container
    location ^~ /uploads/ {
        proxy_pass http://ds-general-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # SSR endpoint for crawlers (internal)
    location ^~ /_ssr/ {
        internal;
        proxy_pass http://ds-general-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Serve other static files directly
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|txt|xml|webmanifest|woff|woff2)$ {
        try_files $uri =404;
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Route-agnostic crawler SSR rewrite for public pages
    location / {
        rewrite ^(.*)$ /_ssr$1 last;
    }

    # Basic health endpoint for container checks
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
